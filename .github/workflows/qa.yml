name: PM League QA
on:
  push:
    paths: ['public/lab/compete.html', 'tests/**']
  pull_request:
    paths: ['public/lab/compete.html', 'tests/**']
  workflow_dispatch:
jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm install jsdom --no-save
      - run: node tests/qa.cjs
