<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PM League — Competitive Lifecycle Simulation (R&D)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;800;900&family=Bungee&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  :root { --ink:#2d2a5e; --mut:#6b7194; --line:#e6e9f4; --red:#ED1B2F; --blue:#6366f1; --purple:#7c3aed; --green:#10b981; --amber:#f59e0b; --bad:#ef4444; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:'Nunito',-apple-system,'Segoe UI',Roboto,sans-serif; font-size:16px;
    background:linear-gradient(160deg,#eef1ff 0%,#f6f0ff 45%,#fdf1f7 100%); background-attachment:fixed; color:var(--ink); }
  header { background:linear-gradient(100deg,#4f46e5,#7c3aed 55%,#a855f7); color:#fff; padding:14px 24px; display:flex; align-items:center; gap:16px; flex-wrap:wrap; position:sticky; top:0; z-index:10; box-shadow:0 4px 20px rgba(79,70,229,.35); }
  header h1 { font-size:1.35rem; margin:0; font-weight:900; letter-spacing:.01em; }
  header h1 span { color:#ddd6fe !important; font-weight:700; font-size:1rem; }
  .rd-badge { background:rgba(255,255,255,.18); color:#fff; font-size:.72rem; font-weight:800; padding:5px 13px; border-radius:999px; letter-spacing:.05em; }
  .stepper { display:flex; gap:6px; margin-left:auto; flex-wrap:wrap; }
  .step { font-size:.85rem; font-weight:800; padding:8px 16px; border-radius:999px; background:rgba(255,255,255,.14); color:#e0e7ff; }
  .step.on { background:#fff; color:#4f46e5; box-shadow:0 2px 10px rgba(0,0,0,.15); } .step.done { background:rgba(16,185,129,.9); color:#fff; }
  main { max-width:1360px; margin:0 auto; padding:20px 18px 60px; }
  .card { background:#fff; border:0; border-radius:22px; padding:22px 24px; margin-bottom:18px; box-shadow:0 6px 24px rgba(45,42,94,.08); }
  .card h2 { margin:0 0 6px; font-size:1.4rem; font-weight:900; } .card h3 { margin:18px 0 8px; font-size:1.05rem; font-weight:800; }
  .sub { color:var(--mut); font-size:.98rem; margin:0 0 10px; line-height:1.6; }
  table { width:100%; border-collapse:collapse; font-size:.92rem; }
  th { text-align:left; color:#5b5f85; background:#f2f4fc; padding:9px 10px; font-size:.78rem; text-transform:uppercase; letter-spacing:.04em; }
  th:first-child { border-radius:10px 0 0 10px; } th:last-child { border-radius:0 10px 10px 0; }
  td { padding:9px 10px; border-top:1px solid var(--line); vertical-align:middle; }
  tr:hover td { background:#fafbff; }
  .btn { border:0; border-radius:999px; padding:14px 26px; font-weight:900; cursor:pointer; font-size:1.02rem; font-family:inherit; transition:transform .12s, box-shadow .12s; }
  .btn:hover { transform:translateY(-2px); }
  .btn-p { background:linear-gradient(100deg,#6366f1,#8b5cf6); color:#fff; box-shadow:0 6px 18px rgba(99,102,241,.4); }
  .btn-s { background:#fff; color:var(--ink); border:2px solid var(--line); }
  .btn-g { background:linear-gradient(100deg,#10b981,#34d399); color:#fff; box-shadow:0 6px 18px rgba(16,185,129,.4); }
  .grid2 { display:grid; grid-template-columns:1.15fr 1fr; gap:18px; align-items:start; }
  @media (max-width:980px){ .grid2 { grid-template-columns:1fr; } }
  .kpis { display:flex; gap:10px; flex-wrap:wrap; margin:10px 0; }
  .kpi { flex:1; min-width:105px; background:linear-gradient(180deg,#fafbff,#f2f4fc); border:0; border-radius:16px; padding:12px 10px; text-align:center; }
  .kpi b { display:block; font-size:1.45rem; font-weight:900; } .kpi span { font-size:.7rem; color:var(--mut); text-transform:uppercase; letter-spacing:.05em; font-weight:800; }
  .ok { color:var(--green); } .warn { color:var(--amber); } .bad { color:var(--bad); }
  .pill { display:inline-block; font-size:.75rem; font-weight:800; padding:3px 10px; border-radius:999px; }
  .pill.hi { background:#fee2e2; color:#991b1b; } .pill.med { background:#fef3c7; color:#92400e; } .pill.lo { background:#d1fae5; color:#065f46; }
  .pill.cut { background:#f1f5f9; color:#94a3b8; text-decoration:line-through; }
  .charter dt { font-weight:900; font-size:.95rem; margin-top:14px; color:#4338ca; } .charter dd { margin:3px 0 0; font-size:.95rem; color:#4b4f73; line-height:1.6; }
  input[type=number] { width:64px; padding:6px 7px; border:2px solid var(--line); border-radius:10px; font-size:.92rem; font-family:inherit; font-weight:700; color:var(--ink); }
  select { padding:6px 7px; border:2px solid var(--line); border-radius:10px; font-size:.88rem; max-width:130px; font-family:inherit; font-weight:700; color:var(--ink); }
  .derived { background:linear-gradient(100deg,#eef2ff,#f5f3ff); border:2px solid #c7d2fe; border-radius:16px; padding:14px 17px; font-size:.95rem; margin-top:12px; line-height:1.7; }
  .derived b { color:#4338ca; }
  .event-card { border:0; border-left:6px solid var(--amber); background:linear-gradient(100deg,#fffbeb,#fff7ed); border-radius:16px; padding:18px 20px; margin-bottom:14px; box-shadow:0 4px 16px rgba(245,158,11,.15); }
  .event-card > b { font-size:1.15rem; }
  .opt { display:block; width:100%; text-align:left; margin:9px 0; padding:14px 16px; border:2px solid var(--line); border-radius:14px; background:#fff; cursor:pointer; font-size:.98rem; font-family:inherit; color:var(--ink); transition:transform .12s, border-color .12s, box-shadow .12s; }
  .opt:hover { border-color:var(--blue); transform:translateY(-2px); box-shadow:0 6px 16px rgba(99,102,241,.18); }
  .opt b { font-weight:800; }
  .opt small { color:var(--mut); display:block; margin-top:3px; font-size:.85rem; }
  .log { font-size:.88rem; color:#4b4f73; max-height:170px; overflow:auto; }
  .log div { padding:5px 0; border-bottom:1px dashed var(--line); }
  .bar { height:12px; background:#e9ecf8; border-radius:999px; overflow:hidden; } .bar i { display:block; height:12px; border-radius:999px; background:linear-gradient(90deg,#6366f1,#a855f7); transition:width .6s ease; }
  .ttype { font-size:1.05rem; }
  .flash { animation:fl 1s ease; } @keyframes fl { 0% { background:#fef9c3; } 100% { background:transparent; } }
  .toast { position:fixed; bottom:20px; right:20px; background:var(--ink); color:#fff; padding:14px 20px; border-radius:16px; font-size:.98rem; font-weight:700; opacity:0; transition:opacity .3s; z-index:60; box-shadow:0 8px 24px rgba(0,0,0,.25); }
  .toast.on { opacity:1; }
  .concept { background:linear-gradient(100deg,#ecfdf5,#f0fdfa); border:2px solid #a7f3d0; border-radius:18px; padding:16px 20px; font-size:1rem; color:#065f46; margin-bottom:16px; line-height:1.65; }
  .tasktbl td:first-child { max-width:240px; }
  /* ------- race-track standings ------- */
  .race { display:flex; flex-direction:column; gap:10px; margin-bottom:16px; }
  .racer { display:flex; align-items:center; gap:14px; background:#fff; border-radius:18px; padding:10px 16px; box-shadow:0 4px 14px rgba(45,42,94,.07); }
  .racer.you { outline:3px solid var(--blue); outline-offset:-3px; background:linear-gradient(100deg,#fff,#f5f6ff); }
  .rbadge { font-size:1.35rem; font-weight:900; min-width:44px; text-align:center; }
  .avatar { width:52px; height:52px; min-width:52px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.7rem; color:#fff; box-shadow:inset 0 -4px 8px rgba(0,0,0,.15); }
  .rmid { flex:1; min-width:0; }
  .rname { font-weight:900; font-size:1.05rem; }
  .rname .youtag { background:var(--blue); color:#fff; font-size:.68rem; padding:2px 9px; border-radius:999px; margin-left:6px; vertical-align:2px; letter-spacing:.04em; }
  .rbar { height:12px; background:#edf0fa; border-radius:999px; overflow:hidden; margin:5px 0 4px; }
  .rbar i { display:block; height:12px; border-radius:999px; transition:width .6s ease; }
  .rmeta { font-size:.82rem; color:var(--mut); font-weight:700; }
  .rscore { text-align:right; min-width:96px; }
  .rscore b { font-size:1.5rem; font-weight:900; display:block; line-height:1.1; }
  .rscore span { font-size:.75rem; color:var(--mut); font-weight:800; text-transform:uppercase; letter-spacing:.04em; }
  .mov { font-size:.85rem; font-weight:900; margin-left:4px; }
  .rival-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:14px; margin-top:12px; }
  .rival { border:0; border-radius:20px; padding:18px; background:#fbfcff; box-shadow:0 4px 14px rgba(45,42,94,.07); border-top:6px solid var(--mut); }
  .rival .ravatar { width:58px; height:58px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.9rem; color:#fff; margin-bottom:10px; box-shadow:inset 0 -4px 8px rgba(0,0,0,.15); }
  .rival b { font-size:1.1rem; font-weight:900; } .rival .tag { font-size:.75rem; color:var(--mut); text-transform:uppercase; letter-spacing:.06em; font-weight:800; margin-top:2px; }
  .rival p { font-size:.9rem; color:#4b4f73; margin:8px 0 0; line-height:1.55; }
  .scout { font-size:.88rem; margin-top:12px; background:#fff; border-radius:14px; padding:12px 14px; line-height:1.8; box-shadow:inset 0 0 0 2px var(--line); }
  .ticker { background:linear-gradient(100deg,#312e81,#4c1d95); color:#e0e7ff; border-radius:18px; padding:14px 18px; font-size:.92rem; max-height:140px; overflow:auto; margin-bottom:16px; line-height:1.7; }
  .ticker div { padding:2px 0; } .ticker b { color:#fff; }
  .podium { display:flex; gap:14px; align-items:flex-end; justify-content:center; margin:26px 0; flex-wrap:wrap; }
  .pod { text-align:center; border-radius:20px 20px 0 0; padding:18px 24px 14px; min-width:180px; color:#fff; box-shadow:0 10px 30px rgba(45,42,94,.25); }
  .pod .medal { font-size:2.6rem; } .pod .score { font-size:2.1rem; font-weight:900; } .pod .pname { font-weight:900; font-size:1rem; }

  /* ------- game intro + phase scenes ------- */
  body::before { content:''; position:fixed; inset:0; z-index:-1; background-size:cover; background-position:center bottom; }

  .card { background:rgba(255,255,255,.97); }
  #intro { position:fixed; inset:0; z-index:100; display:flex; align-items:center; justify-content:center; overflow:hidden;
    background:radial-gradient(1200px 700px at 50% 120%, #4c1d95 0%, #1e1b4b 55%, #0f0a2e 100%); transition:opacity .8s; }
  #intro.off { opacity:0; pointer-events:none; }

// ------------------------- pure plan math (v2) -------------------------
function taskCost(plan, t) {
  const r = plan.resources.find(x => x.id === t.res);
  return r ? r.rate * 8 * 5 * t.dur * (t.alloc / 100) : 0;
}
function planLabour(plan) { return plan.tasks.filter(t => !t.cut).reduce((a, t) => a + taskCost(plan, t), 0); }
function planProc(plan) { return plan.procItems.filter(p => { const t = plan.tasks.find(x => x.id === p.chargeOn); return t && !t.cut; }).reduce((a, p) => a + p.cost, 0); }
function planBudget(plan) { return planLabour(plan) + planProc(plan); }

function overallocation(plan) {
  const out = [];
  const horizon = Math.max(...plan.tasks.filter(t => !t.cut).map(t => t.start + t.dur - 1), 1);
  for (const r of plan.resources) {
    for (let w = 1; w <= horizon; w++) {
      const demand = plan.tasks.filter(t => !t.cut && t.res === r.id && w >= t.start && w < t.start + t.dur)
        .reduce((a, t) => a + t.alloc, 0);
      if (demand > r.availability + 0.01) out.push({ res:r.id, label:r.label, week:w, pct:demand });
    }
  }
  return out;
}

function simulateWeek(plan, progress, week, moraleFactor) {
  const depReady = id => { const t = plan.tasks.find(x => x.id === id); return !t || t.cut || (progress[id] || 0) >= t.dur * 0.6 - 0.01; };
  const active = plan.tasks.filter(t => !t.cut && (progress[t.id] || 0) < t.dur - 0.001 && week >= t.start && (!t.dep || depReady(t.dep)));
  const demand = {};
  active.forEach(t => { demand[t.res] = (demand[t.res] || 0) + t.alloc; });
  let weekCost = 0; const overloaded = [];
  for (const t of active) {
    const r = plan.resources.find(x => x.id === t.res);
    const eff = Math.min(1, (r.availability || 100) / (demand[t.res] || 1));
    if (eff < 0.999 && !overloaded.includes(r.label)) overloaded.push(r.label);
    // v6.2 fix: clamp progress at task duration and prorate the final week's cost —
    // previously teams paid a full week of labour even when a sliver of work remained
    const step = eff * moraleFactor;
    const need = Math.max(0, t.dur - (progress[t.id] || 0));
    const frac = step > 0 ? Math.min(1, need / step) : 0;
    progress[t.id] = (progress[t.id] || 0) + step * frac;
    weekCost += r.rate * 8 * 5 * (t.alloc / 100) * eff * frac;
  }
  return { active, weekCost, overloaded };
}

function pctComplete(plan, progress) {
  const act = plan.tasks.filter(t => !t.cut);
  const done = act.reduce((a, t) => a + Math.min(progress[t.id] || 0, t.dur), 0);
  const tot = act.reduce((a, t) => a + t.dur, 0);
  return tot ? done / tot : 0;
}
function isDoneT(T, id) { const t = T.plan.tasks.find(x => x.id === id); return !!t && !t.cut && (T.progress[id] || 0) >= t.dur - 0.01; }
function allWorkDone(T) { return T.plan.tasks.every(t => t.cut || (T.progress[t.id] || 0) >= t.dur - 0.01); }
function mfOf(T) { let m = Math.min(1.1, Math.max(0.7, 0.7 + 0.004 * T.morale)) * (T.crunchOn ? 1.25 : 1) * (T.tacticPace || 1);
  if (ldr(T) === 'pacesetter') m *= 1.03;
  if (ldr(T) === 'coach' && T.week < 4) m *= 0.9;
  return m; }

function forecastT(T, fromWeek) {
  const p = JSON.parse(JSON.stringify(T.progress)); let w = fromWeek; let guard = 0;
  const mf = Math.min(1.1, Math.max(0.7, 0.7 + 0.004 * T.morale));
  const remaining = () => T.plan.tasks.filter(t => !t.cut && (p[t.id] || 0) < t.dur - 0.01).length;
  while (remaining() > 0 && guard++ < 60) { w++; simulateWeek(T.plan, p, w, mf); }
  return remaining() > 0 ? 99 : w;
}

function evmT(T) {
  const b = T.baseline; if (!b) return null;
  const BAC = b.budget;
  let PV = 0, EV = 0;
  for (const t of b.plan.tasks.filter(t => !t.cut)) {
    const c = taskCost(b.plan, t);
    PV += c * Math.max(0, Math.min(1, (T.week - t.start + 1) / t.dur));
    const cur = T.plan.tasks.find(x => x.id === t.id);
    const frac = cur && !cur.cut ? Math.min(1, (T.progress[t.id] || 0) / t.dur) : (T.progress[t.id] || 0) / t.dur;
    EV += c * Math.min(1, frac);
  }
  const AC = T.spent;
  return { BAC, PV, EV, AC, SPI: PV > 0 ? EV / PV : 1, CPI: AC > 0 ? EV / AC : 1, EAC: AC > 0 && EV > 0 ? BAC / (EV / AC) : BAC };
}

function newTeam(id, name, icon, color, tag, plan, isPlayer) {

    paulGone:false, contractor:false, erpBlown:false,
    crLog:[], decisions:[], ended:false, terminated:false, goLive:null, endReason:'', lastRank:null,
    leader:null, leagueBonus:0, tstats:{}, raided:0, poached:0 };

function lockBaseline(T) {
  T.baseline = { plan: JSON.parse(JSON.stringify(T.plan)), budget: planBudget(T.plan),
    overalloc: overallocation(T.plan), forecastAtBaseline: forecastT(T, 0) };
}
function crT(T, week, text) { T.crLog.unshift({ week, text }); }

function advanceTeamWeek(T, w) {
  if (T.ended) return;
  T.week = w;
  const { weekCost, overloaded } = simulateWeek(T.plan, T.progress, w, mfOf(T));
  T.spent += weekCost * (ldr(T) === 'visionary' ? 1.03 : 1);
  for (const t of T.plan.tasks) {
    if (!t.cut && !T.doneWeek[t.id] && (T.progress[t.id] || 0) >= t.dur - 0.01) {
      T.doneWeek[t.id] = w;
      const od = (ORIG_DUR[t.id] || 0) - (t.origAdj || 0);
      if (od && t.dur < od) {
        const r = T.plan.resources.find(x => x.id === t.res);
        const prem = (od - t.dur) * r.rate * 40 * (t.alloc / 100) * CRASH_FACTOR;
        T.spent += prem;
        crT(T, w, 'Crash premium on "' + t.name + '": $' + (prem/1000).toFixed(1) + 'K (' + (od - t.dur) + ' wk below original estimate)');
      }
    }
  }
  if (overloaded.length) T.morale = Math.max(10, T.morale - 1.5 * overloaded.length);
  for (const p of T.plan.procItems) {
    const t = T.plan.tasks.find(x => x.id === p.chargeOn);
    if (t && !t.cut && !T.procCharged[p.id] && w >= t.start && (T.progress[t.id] || 0) > 0) { T.procCharged[p.id] = true; T.spent += p.cost; }
  }
  for (const t of T.plan.tasks.filter(t => t.type === 'quality')) {
    if (isDoneT(T, t.id) && !t._qCredited) { t._qCredited = true; T.quality = Math.min(100, T.quality + (ldr(T) === 'coach' ? 5 : 3)); }
  }
  if (ldr(T) === 'servant') T.morale = Math.max(60, T.morale);
  if (allWorkDone(T)) { T.ended = true; T.goLive = T.doneWeek['t7'] || w; T.endReason = 'All planned work complete — go-live week ' + T.goLive + '.'; }
  else if (w >= 20) { T.ended = true; T.terminated = true; T.endReason = 'Week 20: fiscal year closed six weeks ago — project terminated by steering committee.'; }
  else if (T.spent > 240000) { T.ended = true; T.terminated = true; T.endReason = 'Spend passed $240K (150% of cap) — project terminated by finance.'; }
}

// ------------------------------ scoring ------------------------------
function finalScore(T) {
  const cap = 160000;
  const budget = T.spent <= cap ? 250 : Math.max(0, Math.round(250 - (T.spent - cap) / cap * 1000));
  const schedule = T.goLive ? (T.goLive <= 14 ? 250 : Math.max(0, 250 - (T.goLive - 14) * 35)) : 0;
  const scopeTasks = T.plan.tasks.filter(t => t.type === 'scope');
  const totVal = scopeTasks.reduce((a, t) => a + (ORIG_DUR[t.id] || t.dur), 0);
  const gotVal = scopeTasks.filter(t => !t.cut && isDoneT(T, t.id)).reduce((a, t) => a + (ORIG_DUR[t.id] || t.dur), 0);
  // launch-gap penalties: shipping without load test / security verification bites AT go-live
  const perfGap = T.goLive && !isDoneT(T, 'qt3') ? 40 : 0;   // launch-day performance incident
  const secGap = T.goLive && !(isDoneT(T, 'qt5') && isDoneT(T, 'pt2')) ? 60 : 0; // security findings post-launch
  const delivery = Math.max(0, Math.min(250, Math.round(gotVal / totVal * 170) + (isDoneT(T, 't6') ? 40 : 0) + (isDoneT(T, 'ct2') ? 40 : 0)) - perfGap);
  const quality = Math.max(0, Math.min(250, Math.round(Math.max(0, T.quality) * 1.7) + (isDoneT(T, 'qt5') ? 25 : 0) + (isDoneT(T, 'pt2') ? 25 : 0) + (isDoneT(T, 'qt3') ? 30 : 0)) - secGap);
  const sponsorBonus = Math.max(0, Math.min(25, Math.round((T.sponsorSat - 70) / 2)));
  const total = budget + schedule + delivery + quality + (T.leagueBonus || 0) + sponsorBonus;
  const grade = total >= 850 ? 'S' : total >= 750 ? 'A' : total >= 650 ? 'B' : total >= 550 ? 'C' : total >= 450 ? 'D' : 'F';
  return { budget, schedule, delivery, quality, total, grade };
}
function criteriaOf(T) {
  const scopeDone = T.plan.tasks.filter(t => t.type === 'scope' && !t.cut).every(t => isDoneT(T, t.id));
  return [
    { name:'All Must-Have requirements delivered (scope complete + UAT)', ok: scopeDone && isDoneT(T, 't6') },
    { name:'Performance benchmarks met (load testing ran)', ok: isDoneT(T, 'qt3') && T.quality >= 65 },
    { name:'Zero critical security findings (scan + pen test ran)', ok: isDoneT(T, 'qt5') && isDoneT(T, 'pt2') },
    { name:'User training completed', ok: isDoneT(T, 'ct2') },
    { name:'Delivered within ±10% of baseline budget', ok: T.baseline ? T.spent <= T.baseline.budget * 1.1 : false },
    { name:'Charter constraint: go-live ≤ week 14', ok: !!T.goLive && T.goLive <= 14 }
  ];
}
function projectScore(T) {
  if (T.ended) return finalScore(T);
  const C = JSON.parse(JSON.stringify(T));
  let w = C.week, guard = 0;
  while (!C.ended && guard++ < 30) { w++; advanceTeamWeek(C, w); }
  return finalScore(C);
}

// ------------------------------ league state ------------------------------
function makeLeague(seed) {
  const player = newTeam('you', 'Your Team', '🎓', '#6366f1', 'Human PM', firstPassPlan(), true);
  const rivals = ARCHETYPES.map(a => { const T = newTeam(a.id, a.name, a.icon, a.color, a.tag, a.build(), false); lockBaseline(T); return T; });
  return { phase:'initiation', week:0, round:0, teams:[player, ...rivals], player, rivals,
    rngState: (seed || (Date.now() & 0x7fffffff)) | 0,
    pendingEvent:null, eventResolved:true, news:[], statusHistory:[] };
}

function applyAIEvent(G, ev) {
  for (const T of G.rivals) {
    if (T.ended) continue;
    const a = ARCHETYPES.find(x => x.id === T.id);
    let idx = a.choose[ev.round];
    ev.options[idx].fx(T, G.week);
    T.decisions.push({ round:ev.round, label:ev.options[idx].label });
    G.news.unshift({ week:G.week, icon:T.icon, team:T.name, text:ev.options[idx].label });
  }
}

function leagueRound(G, playerTactic) {
  G.round++;
  if (playerTactic && !G.player.ended) { const tc = TACTICS.find(t => t.id === playerTactic);
    if (tc) { tc.fx(G.player, G); G.player.tstats[tc.id] = (G.player.tstats[tc.id] || 0) + 1;
      if (tc.id !== 'none') G.news.unshift({ week:G.week, icon:'🎓', team:'Your Team', text:tc.icon + ' ' + tc.name }); } }
  for (const T of G.rivals) { const id = aiTactic(T, G);
    if (id && id !== 'none') { const tc = TACTICS.find(t => t.id === id); tc.fx(T, G); T.tstats[id] = (T.tstats[id] || 0) + 1; G.news.unshift({ week:G.week, icon:T.icon, team:T.name, text:tc.icon + ' ' + tc.name }); } }
  // leader style round drifts (player only — rivals' styles are baked into their archetypes)
  const L = G.player;
  if (!L.ended) {
    if (ldr(L) === 'commander') L.morale = Math.max(10, L.morale - 1);
    if (ldr(L) === 'visionary') L.sponsorSat += 3;
    if (ldr(L) === 'servant') L.sponsorSat -= 2;
  }
  if (rand(G) < 0.45) { const me = MICRO_EVENTS[Math.floor(rand(G) * MICRO_EVENTS.length)];
    for (const T of G.teams) if (!T.ended) me.apply(T, G);
    G.news.unshift({ week:G.week, icon:me.icon, team:'League news', text:me.title }); }
  if (!G.milestones) G.milestones = { market:null, quality:null };
  for (let i = 0; i < WEEKS_PER_ROUND; i++) {
    if (G.teams.every(t => t.ended)) break;
    G.week++;
    for (const T of G.teams) advanceTeamWeek(T, G.week);
    // first-to-milestone races
    if (!G.milestones.market) { const w = G.teams.filter(T => isDoneT(T, 't7')).sort((a, b) => (a.doneWeek['t7'] || 99) - (b.doneWeek['t7'] || 99))[0];
      if (w) { G.milestones.market = w.id; w.leagueBonus += 40; G.news.unshift({ week:G.week, icon:'🏁', team:'League news', text:w.icon + ' ' + w.name + ' hits the MARKET WINDOW first — +40 league bonus!' }); } }
    if (!G.milestones.quality) { const w = G.teams.filter(T => isDoneT(T, 'qt5') && isDoneT(T, 'pt2'))[0];
      if (w) { G.milestones.quality = w.id; w.leagueBonus += 30; G.news.unshift({ week:G.week, icon:'🥇', team:'League news', text:w.icon + ' ' + w.name + ' takes the QUALITY CUP (first verified security) — +30 league bonus!' }); } }
  }
  for (const T of G.teams) T.tacticPace = 1;
  // snapshot ranks
  const ranked = [...G.teams].sort((a, b) => projectScore(b).total - projectScore(a).total);
  ranked.forEach((T, i) => { T.prevRank = T.lastRank; T.lastRank = i + 1; });
  // success attracts attention: the leader pays a tax, the trailer gets a break
  const top = ranked.find(T => !T.ended), bottom = [...ranked].reverse().find(T => !T.ended);
  if (top && bottom && top !== bottom && rand(G) < 0.35) {
    const roll = rand(G);
    if (roll < 0.34) { top.spent += 3000; G.news.unshift({ week:G.week, icon:'🧾', team:'League news', text:'Auditors visit the league leader ' + top.icon + ' ' + top.name + ' — $3K compliance costs' }); }
    else if (roll < 0.67) { top.sponsorSat -= 3; G.news.unshift({ week:G.week, icon:'📈', team:'League news', text:'Expectations rise on ' + top.icon + ' ' + top.name + ' — the sponsor wants more' }); }
    else {
      const shielded = ldr(top) === 'servant' || top.morale >= 75 || (top.isPlayer && playerTactic === 'teambuild');
      if (shielded) G.news.unshift({ week:G.week, icon:'🛡️', team:'League news', text:'Recruiters raid ' + top.icon + ' ' + top.name + ' — repelled! (strong team culture)' });
      else { ['t4','t5','cr1'].forEach(id => { const t = top.plan.tasks.find(x => x.id === id); if (t && !t.cut && (top.progress[id] || 0) < t.dur) t.dur += 1; });
        top.morale = Math.max(10, top.morale - 4); top.raided++;
        G.news.unshift({ week:G.week, icon:'🕵️', team:'League news', text:'Recruiters raid the leader ' + top.icon + ' ' + top.name + ' — dev work slips a week' }); } }
    bottom.morale = Math.min(100, bottom.morale + 4);
    G.news.unshift({ week:G.week, icon:'💪', team:'League news', text:bottom.icon + ' ' + bottom.name + ' has nothing to lose — morale +4' });
  }
  const ev = EVENTS.find(e => e.round === G.round);
  if (ev && !G.player.ended) { G.pendingEvent = ev; G.eventResolved = false; applyAIEvent(G, ev); }
  else { G.pendingEvent = null; G.eventResolved = true; if (ev) applyAIEvent(G, ev); }
  // once the player is done, fast-forward rivals to their own endings
  if (G.player.ended) {
    let w = G.week, guard = 0;
    while (G.rivals.some(T => !T.ended) && guard++ < 30) { w++; for (const T of G.rivals) advanceTeamWeek(T, w); }
    G.week = Math.max(G.week, w);
    G.phase = 'closing';
  }
}

function citySVG() {
  const T = G.player, p = T.plan;

    const prog = Math.min(T.progress[t.id] || 0, t.dur);
    const frac = t.dur ? prog / t.dur : 0;
    const bh = Math.max(frac > 0 ? 8 : 0, Math.round(H * frac));
    const done = frac >= 0.999;
    const activeNow = !t.cut && !done && G.week + 1 >= t.start && G.phase === 'execution';
    const color = DIST_COLOR[t.type];
    const x = t._x;
    if (t.cut) return `<g style="cursor:pointer" opacity=".6" onclick="openTask(${idx})"><rect x="${x}" y="${groundY-12}" width="${w}" height="12" rx="3" fill="#64748b"/><text x="${x+w/2}" y="${groundY+18}" text-anchor="middle" font-size="13" font-weight="800" fill="#cbd5f5">${SHORT[t.id]||'CR'} ✂️</text></g>`;
    const windows = bh > 26 ? `<rect x="${x+w*0.2}" y="${groundY-bh+8}" width="${w*0.16}" height="${Math.max(0,bh-16)}" fill="#fde68a" opacity=".45"/><rect x="${x+w*0.62}" y="${groundY-bh+8}" width="${w*0.16}" height="${Math.max(0,bh-16)}" fill="#fde68a" opacity=".45"/>` : '';
    const crane = `<path d="M${x+w-8} ${groundY-H-4} v-14 h-${w*0.7} m14 0 v8" stroke="#fbbf24" stroke-width="2.5" fill="none"/>`;
    const topper = done ? `<text x="${x+w/2}" y="${groundY-H-10}" text-anchor="middle" font-size="18">🚩</text>`
      : activeNow ? `<text x="${x+w/2}" y="${groundY-bh-10}" text-anchor="middle" font-size="16">${overNow.includes(t.res) ? '⚠️' : '👷'}</text>` : (frac < 0.999 ? crane : '');
    return `<g style="cursor:pointer" ${dim ? 'opacity=".9"' : ''} onclick="openTask(${idx})">
      <rect x="${x}" y="${groundY-H}" width="${w}" height="${H}" rx="5" fill="rgba(255,255,255,.13)" stroke="#aab8ff" stroke-dasharray="7 5" stroke-width="2"/>
      ${H > 40 ? `<line x1="${x+4}" y1="${groundY-H*0.5}" x2="${x+w-4}" y2="${groundY-H*0.5}" stroke="#aab8ff" stroke-width="1" opacity=".4"/>` : ''}
      <rect x="${x}" y="${groundY-bh}" width="${w}" height="${bh}" rx="5" fill="${color}"/>

      <text x="${x+w/2}" y="${groundY+34}" text-anchor="middle" font-size="11.5" font-weight="700" fill="#c3cdff">${Math.round(frac*100)}% · wk${t.start} · ${t.dur}w</text>
    </g>`;
  }).join('');
  const scope = p.tasks.filter(t => t.type === 'scope');
  const support = p.tasks.filter(t => t.type !== 'scope');

function verdictOf(T) {
  const ts = T.tstats || {}, ot = (ts.overtime || 0) + (T.crunched || 0);
  const cuts = T.crLog.filter(c => /^Cut:/.test(c.text) || /Cut: /.test(c.text)).length;
  let v;
  if ((ts.skunk || 0) + (ts.poach || 0) >= 3) v = { icon:'🎲', name:'The Gambler', line:'Every coin had two sides and you flipped them all. Sometimes it even worked.' };
  else if (cuts >= 3) v = { icon:'🗡️', name:'The Machiavellian', line:'Scope, safeguards, promises — all negotiable. The date was not.' };
  else if (ot >= 3) v = { icon:'⚡', name:'The Taskmaster', line:'You bought speed with people. Check what it cost: morale ' + Math.round(T.morale) + '%.' };
  else if ((ts.teambuild || 0) >= 2 && T.morale >= 70) v = { icon:'🤝', name:'The People-First Leader', line:'Your team finished the season still liking their jobs. Rarer than it sounds.' };
  else if ((ts.quality || 0) >= 2 && T.quality >= 78) v = { icon:'🔍', name:'The Craftsman', line:'You shipped something you are not afraid of. UAT agrees.' };
  else v = { icon:'🧭', name:'The Steady Hand', line:'No drama, no heroics — just a plan, maintained. Textbook Monitoring & Controlling.' };
  const L = LEADERS.find(l => l.id === T.leader);
  const match = L ? ((L.id === 'servant' && v.name === 'The People-First Leader') || (L.id === 'commander' && v.name === 'The Taskmaster') || (L.id === 'coach' && v.name === 'The Craftsman') || (L.id === 'diplomat' && v.name === 'The Steady Hand') || (L.id === 'pacesetter' && v.name === 'The Taskmaster')) : null;
  const mirror = L ? (match ? `You chose ${L.icon} ${L.name} — and you played it. Style and behaviour aligned.` : `You chose ${L.icon} ${L.name}… and played ${v.name}. Goleman would like a word — the gap between declared and practiced style is the most common leadership blind spot.`) : '';
  return { v, mirror };
}

      const g = new THREE.Group();
      const s = spec.s;
      const geom = geomFor(spec.shape, s);
      const color = new THREE.Color(DIST_COLOR[t.type]);
      const solid = new THREE.Mesh(geom, new THREE.MeshLambertMaterial({ color, transparent:true, opacity:0.4, emissive:color, emissiveIntensity:0.06 }));
      g.add(solid);
      const ghost = new THREE.LineSegments(new THREE.EdgesGeometry(geom), new THREE.LineBasicMaterial({ color:0xaab8ff, transparent:true, opacity:0.7 }));
      g.add(ghost);
      const hit = new THREE.Mesh(new THREE.SphereGeometry(Math.max(0.85, s * 0.8), 8, 8), new THREE.MeshBasicMaterial({ visible:false }));
      g.add(hit); clickable.push(hit);
      const beacon = new THREE.Mesh(new THREE.SphereGeometry(0.14, 8, 8), new THREE.MeshBasicMaterial({ color:0x34d399 }));
      beacon.visible = false; beacon.position.y = s * 0.9; g.add(beacon);
      const warn = new THREE.Mesh(new THREE.SphereGeometry(0.17, 8, 8), new THREE.MeshBasicMaterial({ color:0xef4444 }));
      warn.visible = false; warn.position.y = s * 0.9; g.add(warn);
      const drone = new THREE.Mesh(new THREE.SphereGeometry(0.11, 8, 8), new THREE.MeshBasicMaterial({ color:0xfbbf24 }));
      drone.visible = false; g.add(drone);
      const label = labelSprite(); label.position.set(0, -(s * 0.75 + 0.55), 0.4); g.add(label);
      g.userData = { solid, ghost, hit, beacon, warn, drone, label, s, cur:0.2, tgt:0.2 };
      return g;
    }
    C3D = { renderer, scene, camera, cam, parts, clickable, wrap, glowLight: glow };
    let extraSlot = 0;
    function sync() {
      const T = G.player, p = T.plan;
      const overNow = overallocation(p).filter(o => o.week === G.week + 1).map(o => o.res);
      const lit = !!T.goLive;
      glow.intensity = lit ? 1.6 : 0;
      for (const t of p.tasks) {
        const idx = p.tasks.indexOf(t);
        let spec = BP.parts[t.id];
        if (!spec) { spec = { shape:'sphere', x:11 + (extraSlot++) * 1.7, row:'main', s:0.8 }; BP.parts[t.id] = spec; }
        let P = parts[t.id];
        if (!P) { P = makePart(t, spec); parts[t.id] = P; scene.add(P); }
        P.position.set(spec.x, spec.row === 'main' ? BP.mainY : BP.backY, spec.row === 'main' ? 0 : BP.backZ);
        P.userData.hit.userData.taskIdx = idx;
        const prog = Math.min(T.progress[t.id] || 0, t.dur);
        const frac = t.dur ? prog / t.dur : 0;
        const done = frac >= 0.999;
        const activeNow = !t.cut && !done && frac > 0 && G.phase === 'execution';
        P.userData.tgt = t.cut ? 0.22 : 0.25 + 0.75 * frac;
        P.userData.solid.material.opacity = t.cut ? 0.25 : 0.35 + 0.65 * frac;
        P.userData.solid.material.color.set(t.cut ? '#64748b' : DIST_COLOR[t.type]);
        P.userData.solid.material.emissive.set(t.cut ? '#334155' : DIST_COLOR[t.type]);
        P.userData.solid.material.emissiveIntensity = done ? (lit ? 0.55 : 0.28) : 0.06;
        P.userData.ghost.visible = !done && !t.cut;
        P.userData.beacon.visible = done && !t.cut;
        P.userData.warn.visible = !t.cut && !done && overNow.includes(t.res) && G.phase === 'execution';
        P.userData.drone.visible = activeNow && !P.userData.warn.visible;
        setLabel(P.userData.label, (SHORT[t.id] || 'CR') + (t.cut ? ' ✂️' : ''), t.cut ? 'cut' : Math.round(frac * 100) + '% · wk' + t.start + ' · ' + t.dur + 'w');
      }
    }
    C3D.sync = sync;
    function resize() { const w = wrap.clientWidth, h = wrap.clientHeight; if (!w || !h) return;
      renderer.setSize(w, h); camera.aspect = w / h; camera.updateProjectionMatrix(); }
    window.addEventListener('resize', resize); setTimeout(resize, 60);
    let drag = null, moved = 0;
    const el = renderer.domElement;
    el.addEventListener('pointerdown', e => { drag = { x:e.clientX, y:e.clientY }; moved = 0; wrap.style.cursor = 'grabbing'; });
    window.addEventListener('pointermove', e => { if (!drag) return; const dx = e.clientX - drag.x, dy = e.clientY - drag.y;
      moved += Math.abs(dx) + Math.abs(dy);
      cam.azi -= dx * 0.005; cam.azi = Math.max(-1.0, Math.min(1.0, cam.azi));
      cam.pol = Math.max(0.7, Math.min(1.42, cam.pol + dy * 0.004));
      drag = { x:e.clientX, y:e.clientY }; });
    window.addEventListener('pointerup', () => { drag = null; wrap.style.cursor = 'grab'; });
    el.addEventListener('wheel', e => { e.preventDefault(); cam.rad = Math.max(10, Math.min(36, cam.rad + e.deltaY * 0.02)); }, { passive:false });
    const ray = new THREE.Raycaster(); const mouse = new THREE.Vector2();
    function pick(e) { const r = el.getBoundingClientRect();
      mouse.x = ((e.clientX - r.left) / r.width) * 2 - 1; mouse.y = -((e.clientY - r.top) / r.height) * 2 + 1;
      ray.setFromCamera(mouse, camera); const hits = ray.intersectObjects(clickable);
      return hits.length ? hits[0].object.userData.taskIdx : null; }
    el.addEventListener('click', e => { if (moved > 6) return; const idx = pick(e); if (idx !== null && idx !== undefined) openTask(idx); });
    el.addEventListener('pointermove', e => { const tip = document.getElementById('c3dtip'); if (!tip) return;
      const idx = drag ? null : pick(e);
      if (idx === null || idx === undefined) { tip.style.display = 'none'; el.style.cursor = ''; return; }
      const t = G.player.plan.tasks[idx]; if (!t) return;
      tip.textContent = t.icon + ' ' + t.name + ' — click to inspect';
      const r = el.getBoundingClientRect();
      tip.style.display = 'block'; tip.style.left = (e.clientX - r.left + 14) + 'px'; tip.style.top = (e.clientY - r.top - 8) + 'px';
      el.style.cursor = 'pointer'; });
    function animate() {
      C3D.raf = requestAnimationFrame(animate);
      const t0 = performance.now() / 1000;
      for (const id in parts) { const P = parts[id];
        P.userData.cur += (P.userData.tgt - P.userData.cur) * 0.08;
        P.userData.solid.scale.setScalar(P.userData.cur);
        if (P.userData.drone.visible) { P.userData.drone.position.set(Math.cos(t0 * 2 + P.position.x) * (P.userData.s * 0.8 + 0.25), P.userData.s * 0.5, Math.sin(t0 * 2 + P.position.x) * (P.userData.s * 0.8 + 0.25)); }
        if (P.userData.warn.visible) { const k = 0.8 + 0.5 * Math.abs(Math.sin(t0 * 5)); P.userData.warn.scale.setScalar(k); }
        if (P.userData.beacon.visible) { P.userData.beacon.material.color.setHSL(0.42, 0.7, 0.45 + 0.2 * Math.sin(t0 * 3)); }
      }
      planet.rotation.y = t0 * 0.01;
      camera.position.set(Math.sin(cam.azi) * Math.sin(cam.pol) * cam.rad, Math.cos(cam.pol) * cam.rad + 3.2, Math.cos(cam.azi) * Math.sin(cam.pol) * cam.rad);
      camera.lookAt(0, 1.8, 0);
      renderer.render(scene, camera);
    }
    animate();
    // ---- full-assembly preview (the "box art"): 2D schematic drawn from the blueprint ----
    try {
      const cv = document.createElement('canvas'); cv.width = 640; cv.height = 360;
      const cx = cv.getContext('2d');
      if (cx) {
        const grad = cx.createLinearGradient(0, 0, 0, 360); grad.addColorStop(0, '#0d0a2e'); grad.addColorStop(1, '#312a6e');
        cx.fillStyle = grad; cx.fillRect(0, 0, 640, 360);
        for (let i = 0; i < 110; i++) { cx.fillStyle = 'rgba(255,255,255,' + (0.2 + Math.random() * 0.65) + ')'; cx.fillRect(Math.random() * 640, Math.random() * 360, 1.6, 1.6); }
        cx.fillStyle = '#453c8c'; cx.beginPath(); cx.arc(320, 780, 460, 0, Math.PI * 2); cx.fill();
        const typeOf = id => id[0] === 't' ? 'scope' : id[0] === 'q' ? 'quality' : id[0] === 'r' ? 'risk' : (id[0] === 'c' && id !== 'cr1') ? 'comm' : id === 'cr1' ? 'scope' : 'proc';
        const X = x => 320 + x * 27, YM = 170, YB = 258, S = v => v * 24;
        cx.strokeStyle = '#8b93d6'; cx.lineWidth = 4;
        cx.beginPath(); cx.moveTo(X(-9.8), YM); cx.lineTo(X(10.4), YM); cx.stroke();
        cx.lineWidth = 3; cx.beginPath(); cx.moveTo(X(-9.2), YB); cx.lineTo(X(9.2), YB); cx.stroke();
        cx.lineWidth = 2; for (const xx of [-4, 0, 4]) { cx.beginPath(); cx.moveTo(X(xx), YM); cx.lineTo(X(xx), YB); cx.stroke(); }
        for (const [id, spec] of Object.entries(BP.parts)) {
          const c = DIST_COLOR[typeOf(id)], px = X(spec.x), py = spec.row === 'main' ? YM : YB, r = S(spec.s) / 2;
          cx.shadowColor = c; cx.shadowBlur = 16; cx.fillStyle = c; cx.strokeStyle = c;
          if (spec.shape === 'sphere') { cx.beginPath(); cx.arc(px, py, r * 0.62, 0, Math.PI * 2); cx.fill(); }
          else if (spec.shape === 'torus') { cx.lineWidth = r * 0.38; cx.beginPath(); cx.arc(px, py, r * 0.68, 0, Math.PI * 2); cx.stroke(); }
          else if (spec.shape === 'cyl') { cx.beginPath(); cx.roundRect(px - r * 0.68, py - r * 0.52, r * 1.36, r * 1.04, 8); cx.fill(); }
          else if (spec.shape === 'panel') { cx.fillRect(px - r * 0.95, py - r * 0.55, r * 0.8, r * 1.1); cx.fillRect(px + r * 0.15, py - r * 0.55, r * 0.8, r * 1.1); }
          else if (spec.shape === 'dish') { cx.beginPath(); cx.arc(px, py, r * 0.6, Math.PI * 0.15, Math.PI * 1.15); cx.lineWidth = r * 0.3; cx.stroke(); }
          else if (spec.shape === 'mast') { cx.fillRect(px - 2, py - r * 1.15, 4, r * 2.1); cx.beginPath(); cx.arc(px, py - r * 1.15, r * 0.28, 0, Math.PI * 2); cx.fill(); }
          else { cx.beginPath(); cx.roundRect(px - r * 0.58, py - r * 0.52, r * 1.16, r * 1.04, 6); cx.fill(); }
          cx.shadowBlur = 0;
        }
        cx.font = '900 22px Nunito, sans-serif'; cx.textAlign = 'center';
        cx.fillStyle = '#ffffff'; cx.fillText('ORBITAL PORTAL STATION', 320, 38);
        cx.font = '700 13px Nunito, sans-serif'; cx.fillStyle = '#a5b4fc'; cx.fillText('— fully assembled —', 320, 58);
        C3D.previewURL = cv.toDataURL('image/png');
        wrap.insertAdjacentHTML('beforeend', '<div id="bpcard" onclick="openPopup(\'assembly\')"><img src="' + C3D.previewURL + '" alt="Fully assembled station"><div>🛰️ Target assembly · tap to enlarge</div></div>');
      }
    } catch (e) {}
    return C3D;
  } catch (e) { C3D = false; return false; }
}

// ---------------- render ----------------
function render() {
  document.body.dataset.phase = G.phase;
  document.getElementById('ribbon').innerHTML = ribbonHTML();
  document.getElementById('lanes').innerHTML = lanesHTML();
  const head = document.getElementById('stagehead'), ban = document.getElementById('stagebanner');
  const c3w = document.getElementById('c3dwrap'), fb = document.getElementById('stagefallback');
  if (G.phase === 'closing') {
    head.innerHTML = ''; ban.innerHTML = '';
    c3w.classList.remove('on'); fb.classList.add('on'); fb.innerHTML = podiumStageHTML();
  } else {
    head.className = 'stage-head'; head.innerHTML = stageHeadHTML(); ban.innerHTML = stageBannerHTML();
    const c3 = initCity3D();
    if (c3) { fb.classList.remove('on'); fb.innerHTML = ''; c3w.classList.add('on'); c3.sync(); }
    else { c3w.classList.remove('on'); fb.classList.add('on'); fb.innerHTML = citySVG(); }
  }
  document.getElementById('notifs').innerHTML = notifsHTML();
  document.getElementById('annabox').innerHTML = `<div class="aav">👩‍💼</div><p><small>ANNA · Coach</small>${annaLine()}</p>`;
  document.getElementById('dock').innerHTML = dockHTML();
  const m = endweekMeta();
  const ew = document.getElementById('endweek');
  ew.textContent = m.label; ew.className = 'btn btn-p' + (m.warn ? ' warn' : '');
  document.getElementById('popuplayer').innerHTML = popupHTML();
  document.getElementById('leaderlayer').innerHTML = leaderHTML();
}

// ---------------- game intro (title screen + ANNA briefing) ----------------
const INTRO_LINES = [
  "Welcome to the PM League — where project managers race, and the plan is the engine.",
  "Five teams. One charter. $160K, fourteen weeks... and a junior PM's first-pass plan with more holes than Swiss cheese.",
  "Your four rivals already locked their baselines: Velocity crashes everything, Granite pads everything, CutCorner cut everything... and Meridian actually read the charter.",
  "I'm ANNA, your coach. Find the flaws, fix the plan, survive the events — and take that podium. Ready?"
];
let dlgIdx = 0, typing = null, voiceOn = true;
function speak(txt) { try { if (!voiceOn || !window.speechSynthesis) return; speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(txt); u.rate = 1.05; u.pitch = 1.08;
  const vs = speechSynthesis.getVoices().filter(v => /^en/i.test(v.lang));
  u.voice = vs.find(x => /female|samantha|zira|aria|karen|serena/i.test(x.name)) || vs[0] || null;
  speechSynthesis.speak(u); } catch(e){} }
function typeLine(txt) { const el = document.getElementById('dlgText'); el.textContent = ''; let i = 0; clearInterval(typing); speak(txt);
  typing = setInterval(() => { el.textContent = txt.slice(0, ++i); if (i >= txt.length) clearInterval(typing); }, 18); }
window.toggleVoice = () => { voiceOn = !voiceOn; document.getElementById('btnVoice').textContent = voiceOn ? '🔊' : '🔇'; if (!voiceOn) try { speechSynthesis.cancel(); } catch(e){} };
window.introStart = () => { document.getElementById('introTitle').style.display = 'none'; document.getElementById('coachScene').classList.add('on'); typeLine(INTRO_LINES[0]); };
window.introNext = () => { const el = document.getElementById('dlgText'); const cur = INTRO_LINES[dlgIdx];
  if (el.textContent.length < cur.length) { clearInterval(typing); el.textContent = cur; return; }
  dlgIdx++;
  if (dlgIdx >= INTRO_LINES.length) return introEnd();
  if (dlgIdx === INTRO_LINES.length - 1) document.getElementById('dlgNext').textContent = '🏁 ENTER THE LEAGUE';
  typeLine(INTRO_LINES[dlgIdx]); };
window.introEnd = () => { try { speechSynthesis.cancel(); } catch(e){} const iv = document.getElementById('intro'); if (iv) { iv.classList.add('off'); setTimeout(() => iv.remove(), 850); }
  if (G.phase === 'initiation' && !uiPopup) setTimeout(() => openPopup('charter'), 700); };
window.continueSeason = () => { if (loadGame()) { render(); toast('Season restored — week ' + G.week + '.'); } const iv = document.getElementById('intro'); if (iv) { iv.classList.add('off'); setTimeout(() => iv.remove(), 850); } };
if (window.speechSynthesis) speechSynthesis.getVoices();
try { if (localStorage.getItem('pml_save')) { const t = document.getElementById('introTitle'); if (t) t.insertAdjacentHTML('beforeend', '<div style="margin-top:16px"><button class="btn btn-g" onclick="continueSeason()">⏩ CONTINUE SEASON</button></div>'); } } catch(e){}

render();

</script>
