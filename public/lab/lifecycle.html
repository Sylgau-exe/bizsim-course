const TYPE_LABEL = { scope:'Scope', quality:'Quality', risk:'Risk response', comm:'Communication', proc:'Procurement' };

// ------------------------------- state -------------------------------
const S = {
  phase:'initiation', plan:firstPassPlan(), baseline:null,
  week:0, round:0, progress:{}, doneWeek:{}, spent:0, procCharged:{},
  morale:75, quality:70, sponsorSat:70,
  pendingEvent:null, eventResolved:true,

  ended:false, endReason:''
};

// ------------------------- pure plan math -------------------------
function taskCost(plan, t) {
  const r = plan.resources.find(x => x.id === t.res);
  return r ? r.rate * 8 * 5 * t.dur * (t.alloc / 100) : 0;
}
function planLabour(plan) { return plan.tasks.filter(t => !t.cut).reduce((a, t) => a + taskCost(plan, t), 0); }
function planProc(plan) { return plan.procItems.filter(p => { const t = plan.tasks.find(x => x.id === p.chargeOn); return t && !t.cut; }).reduce((a, p) => a + p.cost, 0); }
function planBudget(plan) { return planLabour(plan) + planProc(plan); }

function overallocation(plan) {
  // returns [{res,label,week,pct}] where planned demand exceeds availability
  const out = [];
  const horizon = Math.max(...plan.tasks.filter(t => !t.cut).map(t => t.start + t.dur - 1), 1);
  for (const r of plan.resources) {
    for (let w = 1; w <= horizon; w++) {
      const demand = plan.tasks.filter(t => !t.cut && t.res === r.id && w >= t.start && w < t.start + t.dur)
        .reduce((a, t) => a + t.alloc, 0);
      if (demand > r.availability + 0.01) out.push({ res:r.id, label:r.label, week:w, pct:demand });
    }
  }
  return out;
}

// forward simulation (dry run) — used for live forecast AND actual rounds
function simulateWeek(plan, progress, week, moraleFactor) {
  // fast-tracking allowed: a successor may start once its predecessor is 60% complete
  const depReady = id => { const t = plan.tasks.find(x => x.id === id); return !t || t.cut || (progress[id] || 0) >= t.dur * 0.6 - 0.01; };
  const active = plan.tasks.filter(t => !t.cut && (progress[t.id] || 0) < t.dur - 0.001 && week >= t.start && (!t.dep || depReady(t.dep)));
  const demand = {};
  active.forEach(t => { demand[t.res] = (demand[t.res] || 0) + t.alloc; });
  let weekCost = 0; const overloaded = [];
  for (const t of active) {
    const r = plan.resources.find(x => x.id === t.res);
    const eff = Math.min(1, (r.availability || 100) / (demand[t.res] || 1));
    if (eff < 0.999 && !overloaded.includes(r.label)) overloaded.push(r.label);
    progress[t.id] = (progress[t.id] || 0) + eff * moraleFactor;
    weekCost += r.rate * 8 * 5 * (t.alloc / 100) * eff; // pay for work actually performed
  }
  return { active, weekCost, overloaded };
}
function forecast(plan, progress, fromWeek) {
  const p = JSON.parse(JSON.stringify(progress)); let w = fromWeek; let guard = 0;
  const mf = Math.min(1.1, Math.max(0.7, 0.7 + 0.004 * S.morale));
  const remaining = () => plan.tasks.filter(t => !t.cut && (p[t.id] || 0) < t.dur - 0.01).length;
  while (remaining() > 0 && guard++ < 60) { w++; simulateWeek(plan, p, w, mf); }
  return remaining() > 0 ? 99 : w;
}

function pctComplete(plan, progress) {
  const act = plan.tasks.filter(t => !t.cut);
  const done = act.reduce((a, t) => a + Math.min(progress[t.id] || 0, t.dur), 0);
  const tot = act.reduce((a, t) => a + t.dur, 0);
  return tot ? done / tot : 0;
}
function isDone(plan, progress, id) { const t = plan.tasks.find(x => x.id === id); return !!t && !t.cut && (progress[id] || 0) >= t.dur - 0.01; }

// EVM vs original baseline
function evm() {
  const b = S.baseline; if (!b) return null;
  const BAC = b.budget;
  let PV = 0, EV = 0;
  for (const t of b.plan.tasks.filter(t => !t.cut)) {
    const c = taskCost(b.plan, t);
    PV += c * Math.max(0, Math.min(1, (S.week - t.start + 1) / t.dur));
    const cur = S.plan.tasks.find(x => x.id === t.id);
    const frac = cur && !cur.cut ? Math.min(1, (S.progress[t.id] || 0) / t.dur) : (S.progress[t.id] || 0) / t.dur;
    EV += c * Math.min(1, frac);
  }
  PV += b.procPlanned ? 0 : 0;
  const AC = S.spent;
  return { BAC, PV, EV, AC, SPI: PV > 0 ? EV / PV : 1, CPI: AC > 0 ? EV / AC : 1, EAC: AC > 0 && EV > 0 ? BAC / (EV / AC) : BAC };
}

        fx(){ const r4 = S.plan.resources.find(r => r.id === 'r4'); r4.rate = 115; S.spent += 8000; S.morale += 4; cr('Resource r4: Paul retained, $100 → $115/hr + $8K bonus'); log('Paul retained with counter-offer'); } },

      { label:'Crunch the final stretch (+25% pace)', hint:'Morale −15, quality −5. The oldest trade in the book.',
        fx(){ S.crunched++; S.morale -= 15; S.quality -= 5; log('Crunch authorized for final stretch'); } },
      { label:'Hold the plan and present the forecast with variance analysis', hint:'If your maths says ≤14, this is the professional answer.',
        fx(){ const f = forecast(S.plan, S.progress, S.week); S.sponsorSat += (f <= 14 ? 10 : -12); log('Forecast presented: week ' + f + (f <= 14 ? ' — committee satisfied' : ' — committee alarmed')); } },
      { label:'Cut every remaining non-core task to guarantee the date', hint:'Quality/risk/comm tasks not yet done are removed. Consequences at closing.',
        fx(){ S.plan.tasks.forEach(t => { if (!t.core && !t.cut && (S.progress[t.id] || 0) < t.dur) { t.cut = true; cr('Cut: ' + t.name + ' (date protection)'); } }); S.quality -= 6; log('All remaining support tasks cut to protect the date'); } }
    ] }
];

// ------------------------------ engine round ------------------------------
const WEEKS_PER_ROUND = 3;
function runRound() {
  S.round++;
  for (let i = 0; i < WEEKS_PER_ROUND; i++) {
    if (S.plan.tasks.every(t => t.cut || (S.progress[t.id] || 0) >= t.dur - 0.01)) break;
    S.week++;
    const mf = Math.min(1.1, Math.max(0.7, 0.7 + 0.004 * S.morale)) * (S.crunched && S.round >= 4 ? 1.25 : 1);
    const { weekCost, overloaded } = simulateWeek(S.plan, S.progress, S.week, mf);
    S.spent += weekCost;
    for (const t of S.plan.tasks) if (!t.cut && !S.doneWeek[t.id] && (S.progress[t.id] || 0) >= t.dur - 0.01) S.doneWeek[t.id] = S.week;
    if (overloaded.length) S.morale = Math.max(10, S.morale - 1.5 * overloaded.length);
    // procurement charges on task start
    for (const p of S.plan.procItems) {
      const t = S.plan.tasks.find(x => x.id === p.chargeOn);
      if (t && !t.cut && !S.procCharged[p.id] && S.week >= t.start && (S.progress[t.id] || 0) > 0) { S.procCharged[p.id] = true; S.spent += p.cost; }
    }
    // quality gains from completed quality tasks
    for (const t of S.plan.tasks.filter(t => t.type === 'quality')) {
      if (isDone(S.plan, S.progress, t.id) && !t._qCredited) { t._qCredited = true; S.quality = Math.min(100, S.quality + 3); }
    }
  }
  snapshot();
  const remaining = S.plan.tasks.filter(t => !t.cut && (S.progress[t.id] || 0) < t.dur - 0.01).length;
  if (remaining === 0) { S.ended = true; S.endReason = 'All planned work complete — go-live at week ' + (S.doneWeek['t7'] || S.week) + '.'; }
  else if (S.week >= 20) { S.ended = true; S.endReason = 'Week 20: the fiscal year closed six weeks ago. The steering committee terminates the project.'; }
  else if (S.spent > 240000) { S.ended = true; S.endReason = 'Spend passed $240K (150% of cap) — finance terminates the project.'; }
  if (S.ended) { S.phase = 'closing'; render(); return; }
  const ev = EVENTS.find(e => e.round === S.round);
  S.pendingEvent = ev || null; S.eventResolved = !ev;
  render();
}
function snapshot() {
  const e = evm();
  S.statusHistory.push({ week:S.week, pct:Math.round(pctComplete(S.plan, S.progress) * 100), spi:e.SPI, cpi:e.CPI, spent:e.AC, morale:S.morale, quality:S.quality });
}
function log(m) { S.decisionLog.unshift('Wk ' + S.week + ' — ' + m); }
function cr(m) { S.crLog.unshift({ week:S.week, text:m }); }
function toast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('on'); setTimeout(() => t.classList.remove('on'), 2400); }

// ------------------------------ plan editor ------------------------------
function planEditorHTML(exec) {
  const p = S.plan;
  const resOpts = sel => p.resources.map(r => `<option value="${r.id}" ${r.id===sel?'selected':''}>${r.label.split('(')[0].trim()}</option>`).join('');
  const rows = p.tasks.map((t, i) => {
    const done = Math.min(S.progress[t.id] || 0, t.dur);
    const pct = Math.round(done / t.dur * 100);
    const finished = pct >= 100;
    const lock = exec && finished;
    return `<tr style="${t.cut ? 'opacity:.45' : ''}">
      <td><span class="ttype" title="${TYPE_LABEL[t.type]}">${t.icon}</span> ${t.name} ${t.cut ? '<span class="pill cut">CUT</span>' : ''}</td>
      <td>${lock || t.cut ? t.start : `<input type="number" min="${exec ? S.week + 1 : 1}" max="20" value="${t.start}" onchange="editTask(${i},'start',this.value)">`}</td>
      <td>${lock || t.cut ? t.dur : `<input type="number" min="1" max="12" value="${t.dur}" onchange="editTask(${i},'dur',this.value)">`}</td>
      <td>${lock || t.cut ? p.resources.find(r=>r.id===t.res).label.split('(')[0].trim() : `<select onchange="editTask(${i},'res',this.value)">${resOpts(t.res)}</select>`}</td>
      <td>${lock || t.cut ? t.alloc + '%' : `<input type="number" min="10" max="100" step="5" value="${t.alloc}" onchange="editTask(${i},'alloc',this.value)">%`}</td>
      <td>$${Math.round(taskCost(p, t)/1000)}K</td>
      ${exec ? `<td>${finished ? '✅' : pct + '%'}</td>` : ''}
      <td>${t.core || finished ? '' : `<button class="btn btn-s" style="padding:2px 8px;font-size:.7rem" onclick="editTask(${i},'cut',${!t.cut})">${t.cut ? 'Restore' : 'Cut'}</button>`}</td>
    </tr>`;
  }).join('');
  const resRows = p.resources.map((r, i) => `<tr>
    <td>${r.label}</td><td>$${r.rate}/hr</td>
    <td><input type="number" min="10" max="100" step="10" value="${r.availability}" onchange="editResource(${i},this.value)">% </td>
  </tr>`).join('');
  return `
    <table class="tasktbl"><tr><th>Task</th><th>Start</th><th>Wks</th><th>Resource</th><th>Alloc</th><th>Cost</th>${exec ? '<th>Done</th>' : ''}<th></th></tr>${rows}</table>
    <h3>👥 Resources (negotiate availability with functional managers)</h3>
    <table><tr><th>Resource</th><th>Rate</th><th>Availability</th></tr>${resRows}</table>
    <p class="sub" style="margin-top:6px">📦 scope · 🔍/🧪 quality · ⚠️ risk response · 💬 communication · 🛒 procurement (AWS $12K + license $3.5K charge with Cloud Setup; pen test $15K with Pen Test Coordination)</p>
    <div class="derived" id="derived">${derivedHTML()}</div>`;
}

function derivedHTML() {
  const p = S.plan;
  const budget = planBudget(p);
  const over = overallocation(p).filter(o => o.week > S.week);
  const overTxt = over.length
    ? `<span class="bad">⚠️ Overallocated: ${[...new Set(over.map(o => o.label.split('(')[0] + ' wk' + o.week + ' (' + Math.round(o.pct) + '%)'))].slice(0, 4).join(' · ')}${over.length > 4 ? ' +' + (over.length - 4) + ' more' : ''}</span>`
    : '<span class="ok">✅ No resource overallocation ahead</span>';
  const fin = forecast(p, S.progress, S.week);
  const spentTxt = S.baseline ? ` · Spent so far <b>$${Math.round(S.spent/1000)}K</b>` : '';
  return `<b>⚙️ Derived simulation variables</b> — recomputed from this plan:<br>
    Forecast go-live ≈ <b>week ${fin}</b> <span class="${fin <= 14 ? 'ok' : 'bad'}">(charter cap: 14)</span> ·
    Planned cost <b>$${Math.round(budget/1000)}K</b> <span class="${budget <= 160000 ? 'ok' : 'bad'}">(cap $160K)</span>${spentTxt}<br>${overTxt}`;
}

window.editResource = (i, v) => {
  const r = S.plan.resources[i]; const before = r.availability;
  r.availability = +v;
  if (S.phase === 'execution') cr(`Resource "${r.label}" availability: ${before}% → ${r.availability}%`);
  refreshDerived();
};
window.editTask = (i, k, v) => {
  const t = S.plan.tasks[i]; const before = k === 'cut' ? (t.cut ? 'cut' : 'active') : t[k];
  t[k] = (k === 'res') ? v : (k === 'cut' ? v : +v);
  if (S.phase === 'execution') cr(`"${t.name}" ${k}: ${before} → ${k === 'cut' ? (v ? 'cut' : 'active') : t[k]}`);
  refreshDerived(); if (k === 'cut') render();
};
function refreshDerived() {
  const el = document.getElementById('derived');
  if (el) { el.innerHTML = derivedHTML(); el.classList.remove('flash'); void el.offsetWidth; el.classList.add('flash'); }
}

// ------------------------------ M&C ------------------------------
function mcHTML() {
  if (!S.baseline) return '';
  const e = evm();
  const rows = S.statusHistory.map(h => `<tr>
    <td>Wk ${h.week}</td><td>${h.pct}%</td>
    <td class="${h.spi>=0.95?'ok':h.spi>=0.8?'warn':'bad'}">${h.spi.toFixed(2)}</td>
    <td class="${h.cpi>=0.95?'ok':h.cpi>=0.8?'warn':'bad'}">${h.cpi.toFixed(2)}</td>
    <td>$${Math.round(h.spent/1000)}K</td><td>${Math.round(h.morale)}%</td><td>${Math.round(h.quality)}</td></tr>`).join('');
  const miles = [
    { name:'Design complete (UX)', id:'t3' }, { name:'Backend complete', id:'t4' },
    { name:'UAT sign-off', id:'t6' }, { name:'Go-Live', id:'t7' }
  ].map(m => { const t = S.plan.tasks.find(x => x.id === m.id); const done = isDone(S.plan, S.progress, m.id);
    return `<tr><td>${m.name}</td><td>wk ${t.start + t.dur - 1}</td><td>${done ? '✅ done' : (S.week >= t.start + t.dur - 1 ? '<span class="bad">⚠️ late</span>' : '⏳ pending')}</td></tr>`; }).join('');
  return `
    <div class="kpis">
      <div class="kpi"><b class="${e.SPI>=0.95?'ok':e.SPI>=0.8?'warn':'bad'}">${e.SPI.toFixed(2)}</b><span>SPI</span></div>
      <div class="kpi"><b class="${e.CPI>=0.95?'ok':e.CPI>=0.8?'warn':'bad'}">${e.CPI.toFixed(2)}</b><span>CPI</span></div>
      <div class="kpi"><b>$${Math.round(e.AC/1000)}K</b><span>Actual cost</span></div>
      <div class="kpi"><b class="${e.EAC<=176000?'ok':'bad'}">$${Math.round(e.EAC/1000)}K</b><span>EAC</span></div>
      <div class="kpi"><b class="${S.morale>=50?'ok':'bad'}">${Math.round(S.morale)}%</b><span>Morale</span></div>
      <div class="kpi"><b class="${S.quality>=70?'ok':'bad'}">${Math.round(S.quality)}</b><span>Quality</span></div>
      <div class="kpi"><b>${Math.round(S.sponsorSat)}%</b><span>Sponsor</span></div>
    </div>
    <h3>Milestones</h3>
    <table><tr><th>Milestone</th><th>Planned</th><th>Status</th></tr>${miles}</table>
    <h3>Status history</h3>
    <table><tr><th>Date</th><th>% done</th><th>SPI</th><th>CPI</th><th>Spent</th><th>Morale</th><th>Quality</th></tr>${rows || '<tr><td colspan="7" class="sub">No status yet.</td></tr>'}</table>
    <p class="sub" style="margin-top:6px">EVM vs original baseline: BAC $${Math.round(e.BAC/1000)}K. Changes alter the future, not the baseline.</p>`;
}

// ------------------------------ views ------------------------------
function render() {
  const steps = ['initiation','planning','execution','closing'];
  const labels = { initiation:'1 · Initiation', planning:'2 · Planning', execution:'3+4 · Execution & M&C', closing:'5 · Closing' };
  document.getElementById('stepper').innerHTML = steps.map(s =>
    `<span class="step ${s===S.phase?'on':steps.indexOf(s)<steps.indexOf(S.phase)?'done':''}">${labels[s]}</span>`).join('');
  const m = document.getElementById('main');
  m.innerHTML = S.phase === 'initiation' ? viewInitiation() : S.phase === 'planning' ? viewPlanning() : S.phase === 'execution' ? viewExecution() : viewClosing();
  window.scrollTo(0, 0);
}

function viewInitiation() {
  return `
  <div class="concept">🧪 <b>R&D concept:</b> this uses the REAL charter and first-pass plan from the YCBS 288 Plan/Charter tool. The plan is the engine: capacity, cost, schedule and risk exposure are derived live from the task plan the student maintains. The junior PM's first pass contains genuine flaws — finding and fixing them (in Planning or later) is the game.</div>
  <div class="card">
    <h2>📜 Project Charter — ${CHARTER.projectName}</h2>
    <p class="sub">Sponsor: ${CHARTER.sponsor}</p>
    <dl class="charter">
      <dt>Problem</dt><dd>${CHARTER.problem}</dd>
      <dt>Proposed solution</dt><dd>${CHARTER.solution}</dd>
      <dt>Objectives</dt><dd>${CHARTER.objectives.map(o => '• ' + o).join('<br>')}</dd>
      <dt>Constraints</dt><dd>${CHARTER.constraints.map(c => `<span class="pill ${c.impact==='High'?'hi':c.impact==='Medium'?'med':'lo'}">${c.type}</span> ${c.text}`).join('<br>')}</dd>
      <dt>High-level risks</dt><dd>${CHARTER.highLevelRisks.map(r => `<span class="pill ${r.level==='High'?'hi':r.level==='Medium'?'med':'lo'}">${r.level}</span> ${r.text} — <i>${r.mit}</i>`).join('<br>')}</dd>
      <dt>Success criteria</dt><dd>${CHARTER.successCriteria.map(c => '• ' + c).join('<br>')}</dd>
      <dt>Authority</dt><dd>${CHARTER.authority}</dd>
    </dl>
    <div style="margin-top:14px"><button class="btn btn-g" onclick="S.phase='planning';render()">✅ Accept charter → Planning</button></div>
  </div>`;
}

function viewPlanning() {
  return `
  <div class="card">
    <h2>📐 Planning — the junior PM's first-pass plan</h2>
    <p class="sub">Review it against the charter. Use it as-is or fix it — <b>whatever you baseline is what gets simulated</b>. Check the derived panel below: does the schedule respect the constraints? Does the budget close? Is anyone overloaded?</p>
    ${planEditorHTML(false)}
    <div style="margin-top:14px; display:flex; gap:10px;">
      <button class="btn btn-p" onclick="setBaseline()">🔒 Set baseline → Start execution</button>
      <button class="btn btn-s" onclick="S.plan=firstPassPlan();render()">Reset to first-pass plan</button>
    </div>
  </div>`;
}

window.setBaseline = () => {
  S.baseline = { plan: JSON.parse(JSON.stringify(S.plan)), budget: planBudget(S.plan), overalloc: overallocation(S.plan), forecastAtBaseline: forecast(S.plan, {}, 0) };
  S.phase = 'execution'; S.pendingEvent = null; S.eventResolved = true;
  render(); toast('Baseline locked. The engine now runs on YOUR plan.');
};

function viewExecution() {
  const ev = S.pendingEvent;
  const eventBlock = ev && !S.eventResolved ? `
    <div class="event-card"><b>${ev.icon} ${ev.title}</b>
      <p style="margin:6px 0" class="sub">${ev.text()}</p>
      ${ev.options.map((o, i) => `<button class="opt" onclick="decide(${i})"><b>${o.label}</b><small>${o.hint}</small></button>`).join('')}
    </div>` : '';
  const advance = (!ev || S.eventResolved)
    ? `<button class="btn btn-p" onclick="runRound()">▶️ Run weeks ${S.week + 1}–${S.week + WEEKS_PER_ROUND}</button>
       <p class="sub" style="margin-top:6px">Adjust the plan below first if needed — every edit after baseline is a logged change request and re-derives the engine.</p>`
    : `<p class="sub">⚠️ Resolve the event first (you can edit the plan before or after deciding).</p>`;
  return `
  <div class="grid2">
    <div>
      <div class="card">
        <h2>🚀 Execution — Week ${S.week} · ${Math.round(pctComplete(S.plan, S.progress) * 100)}% complete</h2>
        <div class="bar" style="margin:8px 0 12px"><i style="width:${Math.round(pctComplete(S.plan, S.progress) * 100)}%"></i></div>
        ${eventBlock}${advance}
      </div>
      <div class="card"><h2>📊 Monitor & Control</h2>${mcHTML()}</div>
      <div class="card">
        <h3 style="margin-top:0">📋 Change requests (${S.crLog.length})</h3>
        <div class="log">${S.crLog.map(c => `<div>Wk ${c.week} — ${c.text}</div>`).join('') || '<span class="sub">None — baseline untouched.</span>'}</div>
        <h3>🗒️ Decision log</h3>
        <div class="log">${S.decisionLog.map(d => `<div>${d}</div>`).join('') || '<span class="sub">No decisions yet.</span>'}</div>
      </div>
    </div>
    <div class="card">
      <h2>📐 Living project plan</h2>
      <p class="sub">Task-level control: start week, duration, resource, allocation, cut/restore. Finished tasks lock.</p>
      ${planEditorHTML(true)}
    </div>
  </div>`;
}

window.decide = (i) => {
  const ev = S.pendingEvent; if (!ev) return;
  ev.options[i].fx(); S.eventResolved = true;
  S.decisionLog.unshift('Wk ' + S.week + ' — DECISION [' + ev.title + ']: ' + ev.options[i].label);
  render(); toast('Decision recorded — replan if needed, then run the round.');
};

// ------------------------------ closing ------------------------------
function viewClosing() {
  const e = evm();
  const goLive = isDone(S.plan, S.progress, 't7');
  const scopeDone = S.plan.tasks.filter(t => t.type === 'scope' && !t.cut).every(t => isDone(S.plan, S.progress, t.id));
  const crit = [
    { name:'All Must-Have requirements delivered (scope complete + UAT)', ok: scopeDone && isDone(S.plan, S.progress, 't6'), val: scopeDone ? 'delivered' : 'incomplete' },
    { name:'Performance benchmarks met (load testing ran)', ok: isDone(S.plan, S.progress, 'qt3') && S.quality >= 65, val: isDone(S.plan, S.progress, 'qt3') ? 'load-tested, quality ' + Math.round(S.quality) : 'load test never ran' },
    { name:'Zero critical security findings (scan + pen test ran)', ok: isDone(S.plan, S.progress, 'qt5') && isDone(S.plan, S.progress, 'pt2'), val: (isDone(S.plan, S.progress, 'qt5') ? 'scan ✓' : 'scan ✗') + ' · ' + (isDone(S.plan, S.progress, 'pt2') ? 'pen test ✓' : 'pen test ✗') },
    { name:'User training completed', ok: isDone(S.plan, S.progress, 'ct2'), val: isDone(S.plan, S.progress, 'ct2') ? 'town hall + training done' : 'never happened' },
    { name:'Delivered within ±10% of approved budget ($' + Math.round(S.baseline.budget * 1.1 / 1000) + 'K)', ok: S.spent <= S.baseline.budget * 1.1, val: '$' + Math.round(S.spent/1000) + 'K' },
    { name:'Charter constraint: go-live ≤ week 14', ok: goLive && (S.doneWeek['t7'] || 99) <= 14, val: goLive ? 'week ' + S.doneWeek['t7'] : 'no go-live' }
  ];
  const passed = crit.filter(c => c.ok).length;
  const grade = passed === 6 ? 'A+' : passed === 5 ? 'A' : passed === 4 ? 'B' : passed === 3 ? 'C' : passed === 2 ? 'D' : 'F';
  const b = S.baseline;
  const insights = [
    b.forecastAtBaseline > 14
      ? '🔍 <b>Planning:</b> the plan you baselined already forecast go-live at week ' + b.forecastAtBaseline + ' — the junior PM\'s week-17 finish was never fixed. The charter said 14. That flaw was visible before day one.'
      : '✅ <b>Planning:</b> you compressed the first-pass schedule to fit the 14-week constraint before baselining. That is the single highest-value review finding.',
    b.budget > 160000
      ? '🔍 <b>Budget:</b> your baseline cost $' + Math.round(b.budget/1000) + 'K vs the $160K cap — over before you started.'
      : '✅ <b>Budget:</b> baseline $' + Math.round(b.budget/1000) + 'K respected the $160K cap.',
    b.overalloc.some(o => o.res === 'r4')
      ? '🔍 <b>Resources:</b> Paul was booked at up to 150% for weeks in your baseline. Overallocation slows every task it touches — and it is why he resigned.'
      : '✅ <b>Resources:</b> no overallocation at baseline — you caught the junior PM\'s classic mistake.',
    S.crLog.length === 0
      ? '🔍 <b>Change control:</b> zero change requests — the plan was never updated during execution. In a live project, an unmaintained plan stops being true within weeks.'
      : '✅ <b>Change control:</b> ' + S.crLog.length + ' logged changes — the plan stayed a living document, exactly what Monitoring & Controlling is for.',
    S.crunched ? '⚠️ Crunch used — check what it cost in morale (' + Math.round(S.morale) + '%) and quality (' + Math.round(S.quality) + ').' : '✅ No crunch — sustainable pace held.',
    e.CPI < 0.9 ? '⚠️ Final CPI ' + e.CPI.toFixed(2) + ': each planned dollar bought ' + Math.round(e.CPI * 100) + '¢. Trace the leak in the status history.' : '✅ Cost efficiency held (CPI ' + e.CPI.toFixed(2) + ').'
  ];
  return `
  <div class="card">
    <h2>🏁 Closing — ${CHARTER.projectName}</h2>
    <p class="sub">${S.endReason}</p>
    <div class="kpis">
      <div class="kpi" style="flex:0 0 110px"><b style="font-size:1.9rem;color:${passed>=5?'var(--green)':passed>=3?'var(--amber)':'var(--bad)'}">${grade}</b><span>Grade</span></div>
      <div class="kpi"><b>${passed}/6</b><span>Criteria met</span></div>
      <div class="kpi"><b>${e.SPI.toFixed(2)} / ${e.CPI.toFixed(2)}</b><span>SPI / CPI</span></div>
      <div class="kpi"><b>$${Math.round(S.spent/1000)}K</b><span>Final cost</span></div>
      <div class="kpi"><b>${S.crLog.length}</b><span>Change requests</span></div>
      <div class="kpi"><b>${Math.round(S.sponsorSat)}%</b><span>Sponsor satisfaction</span></div>
    </div>
    <h3>Success criteria (from the charter you accepted)</h3>
    <table><tr><th>Criterion</th><th>Result</th><th></th></tr>
      ${crit.map(c => `<tr><td>${c.name}</td><td>${c.val}</td><td>${c.ok ? '✅' : '❌'}</td></tr>`).join('')}</table>
    <h3>Review & analysis</h3>
    <p class="sub" style="line-height:1.8">${insights.join('<br>')}</p>
    <h3>Change request history</h3>
    <div class="log">${S.crLog.map(c => `<div>Wk ${c.week} — ${c.text}</div>`).join('') || '<span class="sub">None.</span>'}</div>
    <div style="margin-top:14px"><button class="btn btn-p" onclick="location.reload()">🔄 Restart</button></div>
  </div>`;
}

render();
</script>
</body>
</html>
